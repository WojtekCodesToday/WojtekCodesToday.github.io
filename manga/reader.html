<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>reader.html</title>
    <link href="https://fonts.cdnfonts.com/css/komika-hands" rel="stylesheet" />
    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="manga.css">
    
    <script src="https://cdn.jsdelivr.net/gh/jagenjo/Canvas2DtoWebGL/src/gl-matrix-min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/jagenjo/Canvas2DtoWebGL/src/litegl.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/jagenjo/Canvas2DtoWebGL/src/Canvas2DtoWebGL.js"></script>
    <script src="../main.js"></script>
    <script type="module" src="../hamburger.js"></script>
</head>
<body>
    <div id="ui" class="manga_panel">Loading...</div>
    <div id="warning" class="manga_panel">Use your mouse to drag, up/down keys to read, or double click to zoom.</div>
    
    <div id="container">
        <canvas id="mangaCanvas"></canvas>
        <div id="scroll-buffer"></div>
    </div>
    
    <div id="nav-footer">
        <button id="previous" class="chapter_button" style="display: none;">Previous chapter</button>
        <button id="next" class="chapter_button" style="display: none;">Next chapter</button>
    </div>
    
    <div id="settings" class="manga_panel" style="display: none;">
        <h2>Settings</h2>
        <label for="selread">Reading mode:</label>
        <select id="selread">
            <option value="0">On two pages</option>
            <option value="1">Comic strip</option>
        </select>
        <hr>
        <h3>Other</h3>
        <input type="checkbox" name="chkwebgl" id="chkwebgl">
        <label for="chkwebgl">Enable WebGL (slow if disabled)</label>
        <br>
        <input type="checkbox" name="chkdebug" id="chkdebug">
        <label for="chkdebug">Debug mode</label>
    </div>

    <script src="reader.js"></script>
</body>
</html>
